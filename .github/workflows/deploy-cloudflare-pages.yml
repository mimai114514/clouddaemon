name: Deploy Web To Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy-cloudflare-pages.yml'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLUTTER_VERSION: '3.38.5'
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install web dependencies
        working-directory: web
        run: flutter pub get

      - name: Analyze web app
        working-directory: web
        run: flutter analyze

      - name: Test web app
        working-directory: web
        run: flutter test

      - name: Build web app
        working-directory: web
        run: flutter build web --dart-define=CI_CD_DEPLOY_TIME="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            pages deploy web/build/web
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}
            --branch=main
